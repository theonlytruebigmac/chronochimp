services:
  # Development Environment
  dev:
    container_name: chronochimp_dev
    image: node:20-alpine
    command: sh -c "npm install && npm run dev"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - .data:/app/.data
    ports:
      - "9004:9004"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development

  # Production Environment
  prod:
    container_name: chronochimp_prod
    image: ghcr.io/theonlytruebigmac/chronochimp:main
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - chronotask_data_prod:/app/.data
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Critical settings that should be consistent
      NEXT_PUBLIC_TRUST_PROXY: "true"
      NEXT_PUBLIC_ALLOW_HTTP_COOKIES: "false"
      # Base URL configuration for proxy setup
      BASE_URL: ${BASE_URL:-https://tik.syschimp.com}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://tik.syschimp.com}
    networks:
      - t3_proxy
    # Ensure container has proper permissions to write to volume
    user: "1001:1001"  # nextjs:nodejs user from Dockerfile

volumes:
  chronotask_data_prod:

networks:
  t3_proxy:
    external: true
      